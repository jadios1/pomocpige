<!DOCTYPE html>
<html>
<head>
    <title>HTML + CSS Cheatsheet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔹 TEKST -->
<h1>Nagłówek H1</h1>
<p>Paragraf <strong>bold</strong> <em>italic</em></p>

<!-- 🔹 LINK + IMAGE -->
<a href="#">Link</a>
<img src="https://via.placeholder.com/100" alt="example image">

<!-- 🔹 BLOCK vs INLINE -->
<div class="block">DIV (block)</div>
<span class="inline">SPAN (inline)</span>

<!-- 🔹 SEMANTIC -->
<section class="box">section</section>
<nav class="box">nav</nav>

<!-- 🔹 TABLE -->
<table>
    <thead>
        <tr><th>Header</th></tr>
    </thead>
    <tbody>
        <tr><td>Data</td></tr>
    </tbody>
</table>

<!-- 🔹 FORM -->
<form>
    <fieldset>
        <legend>Form</legend>

        <label>Email:</label>
        <input type="email" required>

        <label>Checkbox:</label>
        <input type="checkbox">

        <label>Select:</label>
        <select>
            <option>1</option>
        </select>

        <textarea placeholder="text"></textarea>

        <button>Submit</button>
    </fieldset>
</form>

<!-- 🔹 DISPLAY TEST -->
<div class="display-block">block</div>
<div class="display-inline">inline</div>
<div class="display-inline-block">inline-block</div>

<!-- 🔹 FLEX -->
<div class="flex-container">
    <div>1</div>
    <div>2</div>
    <div>3</div>
</div>

<!-- 🔹 GRID -->
<div class="grid-container">
    <div>A</div>
    <div>B</div>
    <div>C</div>
</div>

<!-- 🔹 POSITION -->
<div class="position-parent">
    parent
    <div class="absolute-box">absolute</div>
</div>

<div class="fixed-box">fixed</div>

</body>
</html>
